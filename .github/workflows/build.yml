name: GNNscan Build CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    name: Check version and release status
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      release_needed: ${{ steps.check-tag.outputs.release_needed }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse CHANGELOG.md
        id: parse
        run: python scripts/parse_changelog.py

      - name: Check if tag exists
        id: check-tag
        run: |
          TAG_NAME="${{ steps.parse.outputs.version }}"
          if [ -z "$TAG_NAME" ]; then
            echo "Error: No version detected in CHANGELOG.md."
            echo "release_needed=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists. Skipping release creation."
            echo "release_needed=false" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG_NAME does not exist. A new release is needed."
            echo "release_needed=true" >> $GITHUB_OUTPUT
          fi

  build-windows:
    name: Build Windows App & Installer
    runs-on: windows-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Tests
        run: flutter test

      - name: Build Windows Application
        run: flutter build windows --release

      - name: Verify Build Artifacts
        run: |
          if (Test-Path "build\windows\x64\runner\Release\gnnscan.exe") {
            Write-Host "Windows build success!"
          } else {
            Write-Error "Windows executable missing!"
            exit 1
          }

      - name: Compile Inno Setup Installer
        run: iscc setup.iss

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GNNscan-Windows-Installer
          path: GNNscan_Setup.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Tests
        run: flutter test

      - name: Build macOS Application
        run: flutter build macos --release

      - name: Zip macOS App Bundle
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../GNNscan_macOS.zip *.app

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GNNscan-macOS-App
          path: GNNscan_macOS.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [check-version, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.check-version.outputs.release_needed == 'true'
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Parse CHANGELOG.md for release notes
        run: python scripts/parse_changelog.py
        
      - name: Create and Push Git Tag
        run: |
          TAG_NAME="${{ needs.check-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
        
      - name: Download Windows Installer
        uses: actions/download-artifact@v4
        with:
          name: GNNscan-Windows-Installer
          path: ./
          
      - name: Download macOS App
        uses: actions/download-artifact@v4
        with:
          name: GNNscan-macOS-App
          path: ./
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: GNNscan ${{ needs.check-version.outputs.version }}
          body_path: release_notes.txt
          files: |
            GNNscan_Setup.exe
            GNNscan_macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
