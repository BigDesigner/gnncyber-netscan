name: gnnscan
description: "A high-performance network scanning application targeting Windows and macOS."
publish_to: 'none'

version: 2.8.0+280

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:

  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.0.0
  path: ^1.9.1
  path_provider: ^2.1.2
  pdf: ^3.12.0
  sqflite_common_ffi: ^2.4.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/web/
    - assets/app.png
    - assets/gnnecosystem-logo.png
    - assets/cve_db.sqlite
